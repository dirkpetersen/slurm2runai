# AWS SAM template for deploying the Lambda function
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: s2r Lambda function for SLURM to Run.ai conversion

Parameters:
  SharedSecret:
    Type: String
    Description: Shared secret for HMAC signature verification
    NoEcho: true
    Default: s2r-shared-secret-change-this-in-production

  BedrockModelId:
    Type: String
    Description: Bedrock model ID to use
    Default: us.anthropic.claude-sonnet-4-6

  MaxRequestsPerIpPerDay:
    Type: Number
    Description: Maximum requests per IP per day
    Default: 100

Resources:
  # DynamoDB table for rate limiting
  RateLimitTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: s2r-rate-limits
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ip_date
          AttributeType: S
      KeySchema:
        - AttributeName: ip_date
          KeyType: HASH
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: ttl

  # Lambda function
  S2RFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: s2r-converter
      CodeUri: .
      Handler: lambda_function.lambda_handler
      Runtime: python3.11
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          SHARED_SECRET: !Ref SharedSecret
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          MAX_REQUESTS_PER_IP_PER_DAY: !Ref MaxRequestsPerIpPerDay
          RATE_LIMIT_TABLE: !Ref RateLimitTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RateLimitTable
        - Statement:
            - Sid: BedrockInvokeModel
              Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/*'
                - !Sub 'arn:aws:bedrock:*::foundation-model/*'
                - !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*'
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref S2RHttpApi
            Method: POST
            Path: /

  # HTTP API Gateway in front of the Lambda. We use API Gateway instead of
  # a Lambda Function URL because this account enforces auth on Function URLs
  # (returns 403 even with AuthType=NONE). API Gateway is a separate resource
  # type and is not subject to the same guardrail.
  S2RHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      DisableExecuteApiEndpoint: false

Outputs:
  ApiEndpoint:
    Description: Public HTTP API endpoint
    Value: !Sub 'https://${S2RHttpApi}.execute-api.${AWS::Region}.amazonaws.com/'

  RateLimitTableName:
    Description: DynamoDB table for rate limiting
    Value: !Ref RateLimitTable
